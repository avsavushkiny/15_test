# Simple C++ CI with Windows Support

name: Simple C++ CI

on: [push, pull_request]

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW via Chocolatey
      run: |
        choco install mingw -y
        refreshenv
    
    - name: Build project
      run: |
        g++ -std=c++17 -Wall -Wextra src/calculator.cpp src/main.cpp -o build\\app.exe
        echo "Build successful"
    
    - name: Run main program
      run: |
        build\\app.exe
        echo "Program executed successfully"
    
    - name: Run tests
      run: |
        g++ -std=c++17 -Wall -Wextra src/calculator.cpp tests/test_calculator.cpp -o tests.exe
        .\\tests.exe
        echo "Tests passed"
    
    - name: Check compilation warnings
      run: |
        g++ -std=c++17 -Wall -Wextra -Werror src/calculator.cpp src/main.cpp -o app_check.exe
        echo "No warnings"
    
    - name: Verify output
      run: |
        $OUTPUT = (.uild\app.exe)
        if ($OUTPUT -match "Sum of 10 \+ 20 = 30") {
          echo "Output verification passed"
        } else {
          echo "Output verification failed"
          exit 1
        }